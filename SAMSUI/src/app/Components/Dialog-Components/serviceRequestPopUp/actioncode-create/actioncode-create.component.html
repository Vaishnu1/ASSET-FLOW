<div fxLayout="column">
  <div fxLayout="row">
    <div fxFlex="95">
      <h4 class="dialogue-box-header">{{headingDisplay}} {{ 'MENU_ACTION_CODE' | translate }}</h4>
    </div>

    <div fxFlex="5" fxLayoutAlign="end start">
      <mat-icon class="close-icon" (click)="closeModalActionCode()">highlight_off</mat-icon>
    </div>
  </div>

  <form class="modalform" fxFlex="100" [formGroup]="actionCodeForm"  style="padding-top: 20px;">
    <div fxLayout="column" fxFlex="100" fxLayoutAlign="start center">
      <mat-form-field class="example-full-width" [floatLabel]="'always'" hintLabel="{{ CommonhintMsg.MAX_100 }}">
        <mat-label class=" input-label">{{ 'SR_ACTION_CODE' | translate }}
          <span class="mandatory-style">*</span>
        </mat-label>
        <input matInput formControlName="attribute4Name" #actioncodeFocus
          (input)="checkUniqueConstrainForActionCodeType()" [maxlength]="100"
          oninput="this.value = this.value.toUpperCase()" class="input-field">
        <mat-hint align="end">{{actionCodeForm.controls.attribute4Name.value?.length || 0}}/100</mat-hint>
        <mat-error
          *ngIf="actionCodeForm.controls.attribute4Name.errors && actionCodeForm.controls.attribute4Name.touched">
          <div *ngIf="actionCodeForm.controls.attribute4Name.errors.required">{{ 'SR_ACTION_CODE' | translate }}
            is Required </div>
          <div *ngIf="actionCodeForm.controls.attribute4Name.errors.notUnique">{{ErrorMsg}}</div>
        </mat-error>
      </mat-form-field>

      <div fxLayoutAlign="center center" style="padding-top: 5px;">
        <button mat-raised-button color="primary" (click)="submitActionCode()"
          [disabled]="actionCodeForm.invalid || !actionCodeForm.dirty || uploadActionCodeFlag">
          <span *ngIf="!uploadActionCodeFlag">{{displayButton}}</span>
          <span *ngIf="uploadActionCodeFlag">{{'COMMON_LOADING' | translate}}</span>
        </button>
      </div>
    </div>
  </form>

</div>
