<div fxLayout="column">

  <div fxLayout="row">
    <div fxFlex="90">
      <h4 class="section_title">Group Assign For {{userName}}</h4>
    </div>
    <!-- <mat-divider></mat-divider> -->
    <div fxFlex="10" fxLayoutAlign="end start">
      <mat-icon class="close-icon" (click)="closeModal()">highlight_off</mat-icon>
    </div>
  </div>

  <form fxLayout="column">
    <div fxLayout="row">
     
      <div fxFlex="100" class="add-group-container-table">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" fxFlex="row">
          <ng-container matColumnDef="groupName">
            <th mat-header-cell *matHeaderCellDef> {{'GROUP' | translate}} </th>
            <td mat-cell *matCellDef="let element"> {{element.groupName}} </td>
          </ng-container>

          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef> Active </th>
            <td mat-cell *matCellDef="let element">
              <mat-slide-toggle [checked]="element.active" (click)="updateBtnflag()" [(ngModel)]="element.active" color="primary"
                [ngModelOptions]="{standalone: true}"></mat-slide-toggle>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
          <tr mat-row *matRowDef="let element; columns: displayedColumns;"></tr>
        </table>
      </div>
      
    </div>
    <div>
      <div fxLayoutAlign="center center" style="margin-top:30px;">
        <!-- <button mat-raised-button type="button" class="space col-md-2" color="primary"
          (click)="closeModal()">{{'COMMON_CLOSE' | translate}}</button> -->

        <button mat-raised-button type="button" class="space" color="primary" [disabled]="uploadBtnFlag"
          (click)="saveOrUpdateGroupMapping()">{{'COMMON_SUBMIT' | translate}}</button>

      </div>

    </div>
  </form>
</div>
