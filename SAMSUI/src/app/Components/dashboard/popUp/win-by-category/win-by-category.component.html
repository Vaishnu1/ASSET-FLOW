

<div class="row">
  <div class="col-md-10">
    Category
  </div>
  <div class="col-md-2">
      <mat-icon class="close-icon-small" (click)="cancel()">highlight_off</mat-icon>
  </div>
</div>
<div class="example-container" style="padding-top: 10px;">
  <table mat-table [dataSource]="assetCategoryList">

    <ng-container matColumnDef="sNo">
      <th mat-header-cell *matHeaderCellDef>{{ 'S_NO' | translate }}</th>
      <td mat-cell *matCellDef="let element; let i=index;"> {{i+1}} </td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef> {{ 'NAME' | translate }} </th>
      <td (click)="loadModelDetails(i,element.categoryId,element.category)" mat-cell *matCellDef="let element; let i = index;"> {{element.category}} </td>
    </ng-container>


    <ng-container matColumnDef="count">
      <th mat-header-cell *matHeaderCellDef> {{ 'COUNT' | translate }} </th>
      <td (click)="loadModelDetails(i,element.categoryId,element.category)" mat-cell *matCellDef="let element" > {{element.count}} </td>
    </ng-container>

    <ng-container matColumnDef="value">
      <th mat-header-cell *matHeaderCellDef> {{ 'VALUE' | translate }} {{currencySymbol}}</th>
      <td (click)="loadModelDetails(i,element.categoryId,element.category)" mat-cell *matCellDef="let element" align="right"> {{element.value | number : '1.2-2'}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr (click)="loadModelDetails(i,element.categoryId,element.category)" mat-row *matRowDef="let row; columns: displayedColumns;let i = index"></tr>

  </table>
</div>
