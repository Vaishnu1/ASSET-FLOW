<form class="modalform" [formGroup]="serviceRequestCountReportForm">
  <div class="row closebutton">
    <div class="col-md-12">
      <h4 class="section_title">{{'REPORT_SR_REPORT' | translate}}</h4>
    </div>
    <mat-divider></mat-divider>
  </div>

  <div class="row">
    <div class="col-md-12">
      <div class="form-group">
        <span matLabel>{{'REPORT_LOCATION' | translate}}</span>
        <ng-select tabindex=1 [items]="locationCombo" autofocus required #FormFirstLoc bindLabel="locDisplayField"
          (search)="loadLocationComboData($event)" (change)="selectedLocationData($event)"
          formControlName="locationName"></ng-select>
      </div>
      <div class="form-group row">
        <div class="col-md-6">
          <mat-form-field class="example-full-width" [floatLabel]="'always'">
            <mat-label class="example-label input-label">{{'REPORT_FROM_DATE' | translate}}</mat-label>
            <input matInput tabindex=2 formControlName="createdDtDisp" [max]="updatedDtDisp.value" (click)="picker1.open()" (dateChange)="setToFocus()"
              [matDatepicker]="picker1" (keypress)="dateValidation1($event)">
            <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
            <mat-datepicker #picker1></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="col-md-6">
          <mat-form-field class="example-full-width" [floatLabel]="'always'">
              <mat-label class="example-label input-label">{{'REPORT_TO_DATE' | translate}}</mat-label>
              <input matInput tabindex=3 formControlName="updatedDtDisp" (click)="picker2.open()" [min]="createdDtDisp.value"
                [matDatepicker]="picker2" (keypress)="dateValidation2($event)">
              <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
              <mat-datepicker #picker2></mat-datepicker>
            </mat-form-field>
        </div>
      </div>

    </div>

  </div>

  <div class="row">
    <div class="col-md-6"></div>
    <div class="col-md-2">
      <button mat-raised-button color="primary" (click)="clearData()">{{'COMMON_CLEAR' | translate}}</button>
    </div>
    <div class="col-md-2">
      <button mat-raised-button color="primary" (click)=closeModal()>{{'COMMON_CLOSE' | translate}}</button>
    </div>
    <div class="col-md-2">
      <button mat-raised-button color="primary" [disabled]="serviceRequestCountReportForm.invalid"
        (click)="generateReport()">{{'REPORT_EXPORT' | translate}}</button>
    </div>
  </div>
</form>
