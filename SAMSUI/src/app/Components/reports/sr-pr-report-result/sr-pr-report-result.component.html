<div class="top-content row">
  <div class="col-md-8">
    <mat-toolbar-row>   
      <nav aria-label="breadcrumb" class="breadcrumblink">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="#" [routerLink]="['/dashboard']"><mat-icon class="breadcrumbicon">home</mat-icon></a></li>
            <li class="breadcrumb-item">Reports</li>
            <li class="breadcrumb-item active" aria-current="page"><a href="#" [routerLink]="['/manageReports']">Manage reports</a></li>
            <li class="breadcrumb-item active" aria-current="page"><a (click)="changeRoute()">{{message.searchValue}}</a></li>
            <li class="breadcrumb-item active" aria-current="page">Result</li>
        </ol>
      </nav>
      <span class="example-spacer"></span>
    </mat-toolbar-row>
  </div>
</div>
<div class="content_section">
  <div class="row">
      <div id="chartdiv" style="width: 100%; height: 500px"></div>
  </div>
  <div class="row">
    <div class="table_section col-md-12">
        <div class="row">
          <div class="col-md-12">
          <div class="example-header">
            <form>
              <div class="form-group">
                <div class="row">
                  <div class="col-md-11"> 
                  </div>
                  <div class="col-md-1 rightbutton">
                    <button mat-raised-button color="primary" matTooltip="Export" (click)="Export()">Export</button>
                  </div>
                </div>
              </div>
            </form>
          </div>
          </div>
          
        </div>
        <div class="example-container mat-elevation-z8">
          
          <table mat-table [dataSource]="dataSource">
            <ng-container matColumnDef="sno">
                <th mat-header-cell *matHeaderCellDef>S.No</th>
                <td mat-cell *matCellDef="let element; let i=index;"> {{(i+1)}} </td>
            </ng-container>
            <ng-container matColumnDef="location">
              <th mat-header-cell *matHeaderCellDef>Location</th>
              <td mat-cell *matCellDef="let element"> {{element.locationName}} </td>
            </ng-container>
            <ng-container matColumnDef="count">
              <th mat-header-cell *matHeaderCellDef>Count</th>
              <td mat-cell *matCellDef="let element"> {{element.woPrDaysDisp}} </td>
            </ng-container>
            <ng-container matColumnDef="percent">
              <th mat-header-cell *matHeaderCellDef>Percentage</th>
              <td mat-cell *matCellDef="let element"> {{element.closedByRating}} </td>
            </ng-container>
            
            <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
            <tr mat-row *matRowDef="let element; columns: displayedColumns;">
            </tr>
          </table>
        
        </div>
        
    </div>
  </div>
</div>
