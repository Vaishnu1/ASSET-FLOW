<div fxLayout="column" fxFlex="100">
  <div fxLayout="row" *ngIf="length > 0">
    <div fxFlex="50">
      <mat-icon class="example-tab-icon" (click)="showtbl('tbl')" class="tblview">table_chart</mat-icon>
        <button (click)="exportToexcel()" class="export">
         description
        </button>
    </div> 
  </div>
 
  <div fxLayout="row" style="padding-top: 10px;"> 
    <div class="reports-container-table" fxFlex="100" *ngIf="showtab === 'tbl'"> 
      <div fxLayout="row">
      <table mat-table fxFlex="100" [dataSource]="dataSource1">   
          <ng-container matColumnDef="sno">
              <th mat-header-cell *matHeaderCellDef>S.No</th>
              <td mat-cell *matCellDef="let element; let i=index;"> {{(i+1)}} </td>
          </ng-container>
          <ng-container matColumnDef="location">
            <th mat-header-cell *matHeaderCellDef>Location</th>
            <td mat-cell *matCellDef="let element"> {{element.locationName}} </td>
          </ng-container>
          <ng-container matColumnDef="count">
            <th mat-header-cell *matHeaderCellDef>Count</th>
            <td mat-cell *matCellDef="let element"> {{element.woPrDaysDisp}} </td>
          </ng-container>
          <ng-container matColumnDef="percent">
            <th mat-header-cell *matHeaderCellDef>Percentage</th>
            <td mat-cell *matCellDef="let element"> {{element.closedByRating}} </td>
          </ng-container>
          
          <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
          <tr mat-row *matRowDef="let element; columns: displayedColumns;">
          </tr>
        </table> 
      </div>
     
      <div fxLayout="row">
        <mat-card class="no_records_found" *ngIf="length==0">No Record Found</mat-card>
      </div> 
   </div>
  </div>
</div>
