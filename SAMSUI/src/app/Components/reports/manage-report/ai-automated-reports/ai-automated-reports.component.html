<div class="auto-report-wrapper">

    <!-- Title row with close icon -->
    <div class="title-row">
        <h2 class="header">Automated Reports</h2>
        <mat-icon class="close-icon" (click)="close()">highlight_off</mat-icon>
    </div>

    <!-- Subtitle -->
    <p class="subtext">
        These reports are automatically generated by the system on a daily basis. You can request and receive them directly via email.
    </p>

    <!-- Report list -->
    <div class="report-grid">
        <div class="report-card">
            <div class="card-title">Asset Summary Report</div>
            <div class="card-content">
                Click below to generate today's asset summary report. It will be sent to your email shortly.
            </div>
            <div class="card-actions">
                <button mat-raised-button color="primary" [disabled]="!aiAssetSummaryAccessModule.createFlagDisplay" (click)="downloadAssetSummary()">Send Report to Email</button>
            </div>
        </div>
    </div>
    
</div>
