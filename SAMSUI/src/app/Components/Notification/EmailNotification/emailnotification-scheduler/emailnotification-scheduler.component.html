<!-- ===== BREADCRUMB ===== -->
<div class="page-wrapper">
  <div class="breadcrumb-strip" fxLayout="row" fxLayoutAlign="space-between center">

    <!-- LEFT -->
    <div class="breadcrumb" fxLayout="row" fxLayoutAlign="start center">
      <mat-icon class="home-icon">home</mat-icon>
        <span class="crumb">Notification</span>
      <mat-icon>keyboard_arrow_right</mat-icon>
      <span class="crumb active">Email Notification</span>
    </div>

    <!-- RIGHT BUTTONS -->
    <div class="top-right-actions">

      <button mat-raised-button color="primary" (click)="goBack()">Back</button>
      <button *ngIf="mode !== 'view'" mat-raised-button color="primary" class="ml-10" (click)="clear()">Clear</button>
      <button *ngIf="mode !== 'view'" mat-raised-button color="primary" class="ml-10" [disabled]="schedulerForm.invalid" (click)="saveSchedule()">
        {{ mode === 'create' ? 'Add to Schedule' : 'Update Schedule' }}
      </button>

    </div>

  </div>


  <!-- ===== HEADER TABS ===== -->
  <div class="asset-header-tabs">
    <div class="tab-group">
      <span class="tab" (click)="goToTemplate()">Template</span>
      <span class="tab" (click)="goToNotificationType()">Notification Configuration</span>

        <!-- SETTINGS near Scheduler -->
        <div class="header">
          <span class="tab active" >Scheduler</span>
          <button mat-icon-button [matMenuTriggerFor]="settingsMenu">
            <mat-icon class="settings-btn">settings</mat-icon>
          </button>
         </div>
    </div>

    <mat-menu #settingsMenu="matMenu">
      <button mat-menu-item *ngIf="mode !== 'view'" (click)="deleteSchedule()">
        <mat-icon color="warn">delete</mat-icon>
        Delete
      </button>
    </mat-menu>
  </div>
    

  <!-- ===== FORM CARD ===== -->
  <div class="form-card">
    <form [formGroup]="schedulerForm" [class.view-mode]="mode === 'view'">

      <!-- ROW 1 -->
      <div fxLayout="row" fxLayoutGap="30px">

        <div fxFlex="33">
          <label class="input-label">Process <span class="req">*</span></label>
          <ng-select
            [items]="moduleList"
            bindLabel="moduleName"
            bindValue="moduleId"
            formControlName="module">
          </ng-select>
        </div>

        <div fxFlex="33">
          <label class="input-label">Status<span class="req">*</span></label>
          <ng-select
            [items]="processList"
            bindLabel="processName"
            bindValue="processId"
            formControlName="process">
          </ng-select>
        </div>

        <div fxFlex="33">
          <label class="input-label">Time Zone</label>
          <ng-select
            [items]="timeZoneList"
            formControlName="timeZone">
          </ng-select>
        </div>

      </div>

      <!-- ROW 2 -->
      <div fxLayout="row" fxLayoutGap="30px" class="mt-25">

        <div fxFlex="50">
          <label class="input-label">Indication (Cron)</label>
          <input type="text" class="plain-input" formControlName="cron">
        </div>

        <div fxFlex="50">
          <label class="input-label">Schedule</label>
          <input type="text" class="plain-input" [value]="scheduleText" readonly>
        </div>

        <div fxFlex="50">
          <label class="input-label">Minute</label>
          <input type="number" class="plain-input" formControlName="minute">
        </div>

        

      </div>

      <!-- ROW 3 -->
      <div fxLayout="row" fxLayoutGap="30px" class="mt-25">

        <!-- <div fxFlex="20">
          <label class="input-label">Minute</label>
          <input type="number" class="plain-input" formControlName="minute">
        </div> -->

        <div fxFlex="20">
          <label class="input-label">Hour</label>
          <input type="number" class="plain-input" formControlName="hour">
        </div>

        <div fxFlex="20">
          <label class="input-label">Day</label>
          <input type="number" class="plain-input" formControlName="day">
        </div>

        <div fxFlex="20">
          <label class="input-label">Month</label>
          <input type="number" class="plain-input" formControlName="month">
        </div>

        <div fxFlex="20">
          <label class="input-label">Week</label>
          <input type="number" class="plain-input" formControlName="week">
        </div>

        
      <div fxFlex="20" class="mt-25">
        <mat-checkbox formControlName="isActive">Active</mat-checkbox>
      </div>

      </div>

      <!-- ACTIVE -->
     <!-- <div class="mt-25">
        <mat-checkbox formControlName="isActive">Active</mat-checkbox>
      </div> -->

    </form>
  </div>
</div>
