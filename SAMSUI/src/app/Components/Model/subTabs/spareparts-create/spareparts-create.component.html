<div fxLayout="column">
  <div fxLayout="row">
    <div fxFlex="80">
      <h4 class="dialogue-box-header"> {{'MODEL_ITEMS' | translate}}</h4>
    </div>
    <!-- <div fxFlex="20" fxLayoutAlign="end end">
      <button mat-raised-button color="primary" (click)="openItemScreen(0)" class="space">
          {{ 'MODEL_ADD_ITEM' | translate }}</button>
    </div> -->
    <div fxFlex="10" fxLayoutAlign="end center">
      <button mat-raised-button type="button" class="space" 
      (click)="closeModal()" color="primary" >{{ 'COMMON_BACK' | translate }}</button>
    </div>
    <div fxFlex="10" fxLayoutAlign="end center">
      <button mat-raised-button type="button" 
      (click)="addItemModel()" color="primary" >{{ 'COMMON_SUBMIT' | translate }}</button>  
    </div>
  </div>

  <form [formGroup]="modelItemForm" role="dialog">
      <div fxLayout="column">
        <div fxLayout="row" [@.disabled]="true">
          <mat-tab-group fxFlex="100">
            <mat-tab label="{{ 'MODEL_ITEMS' | translate }}">
              <mat-card fxFlex="100">
                <mat-card-content>
                  <div class="content-style" fxLayout="column">
                    <div fxLayout="row" fxFlex="100">
                      <div fxLayout="column" fxFlex="50">
                          <div class="form-group">
                            <div class="example-full-width">
                              <mat-form-field class="example-full-width example-width input-lable-font" [floatLabel]="'always'">
                                <span class="input-label"> {{ 'ITEM_TYPE' | translate }}</span>
                                <input matInput formControlName="itemTypeName" oninput="this.value = this.value.toUpperCase()"
                                class="input-field">
                              </mat-form-field>
                            </div>
                          </div>
                      </div>
                      <div fxLayout="column" fxFlex="50">
                        <div class="form-group">
                          <div class="example-full-width">
                            <span class="input-label"> {{ 'ITEM_NAME' | translate }} </span>
                            <ng-select class="input-field item-list" formControlName="itemMasterName"
                              (search)="listOfItemMaster($event)" (click)="listOfItemMaster({})"
                              (change)="selectedItemMasterName($event)" [items]="itemMasterNameCombo" [virtualScroll]="true"
                              (scrollToEnd)="listOfItemMaster({})" (keyup.backspace)="listOfItemMaster($event.target.value ? $event : 'back')" 
                              (clear)="listOfItemMaster('clear')" [loading]="scrollItemMasterNameSync" bindLabel="itemMasterName"
                              bindValue="itemMasterName">
                            </ng-select>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="example-container" style="padding-top: 0.5%;" class="model-item-container-table">
                      <table #matSpareParts mat-table [dataSource]="modelItemsDataSource">
                        <ng-container matColumnDef="sno">
                          <th mat-header-cell *matHeaderCellDef> {{ 'COMMON_S_NO' | translate }} </th>
                          <td mat-cell *matCellDef="let element; let i=index;"> {{i+1}} </td>
                        </ng-container>
                        <ng-container matColumnDef="itemMasterName">
                          <th mat-header-cell *matHeaderCellDef> {{ 'ITEM_NAME' | translate }} </th>
                          <td style="word-wrap: break-word !important;width: 250px" mat-cell *matCellDef="let element"> {{element.itemMasterName}} </td>
                        </ng-container>
                        <ng-container matColumnDef="itemMasterDesc">
                          <th mat-header-cell *matHeaderCellDef> {{ 'ITEM_DESC' | translate }} </th>
                          <td style="word-wrap: break-word !important;width: 250px" mat-cell *matCellDef="let element"> {{element.itemMasterName}} </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                          <th mat-header-cell *matHeaderCellDef> {{ 'COMMON_ACTION' | translate }} </th>
                          <td mat-cell *matCellDef="let element; let i = index">
                            <mat-icon class="action_icon" color="warn" matTooltip="{{ 'COMMON_DELETE' | translate }}"
                              (click)="DeleteItem(element,i)">delete</mat-icon>
                          </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="modelItemsDisCol;sticky: true"></tr>
                        <tr mat-row *matRowDef="let element; columns: modelItemsDisCol;">
                      </table>
                    </div>
                  </div>
                </mat-card-content>
              </mat-card>
            </mat-tab>
          </mat-tab-group>
        </div>
      </div> 
  </form>
</div>
