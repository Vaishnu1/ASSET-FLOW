<mat-icon class="close-icon-large" (click)="closeModal()">highlight_off</mat-icon>
<form class="modalform" [formGroup]="assetStatusForm">
    <div class="row closebutton">
        <div class="col-md-10">
            <h4 class="section_title">{{headingDisplay}} {{ 'MENU_ASSET_STATUS' | translate }}</h4>
          </div>
      </div>
      
      <div class="row">
        <div class="col-md-12">
          <div class="form-group">
            <mat-form-field class="example-full-width" [floatLabel]="'always'" hintLabel="{{ CommonhintMsg.MAX_100 }}">
              <mat-label class="example-label input-label"> {{'ASSET_STATUS' | translate}} </mat-label>
                <input #assetStatusFocus matInput formControlName="assetStatusName" required [maxlength]="100" 
                (input)="checkForAssetStatusNameExistence()" oninput="this.value = this.value.toUpperCase()">
                <mat-hint align="end">{{assetStatusForm.controls.assetStatusName.value?.length || 0}}/100</mat-hint>
                <mat-error *ngIf="assetStatusForm.controls.assetStatusName.errors && assetStatusForm.controls.assetStatusName.touched">
                  <div *ngIf="assetStatusForm.controls.assetStatusName.errors.required">{{'ASSET_STATUS' | translate}} is Required </div>
                  <div *ngIf="assetStatusForm.controls.assetStatusName.errors.maxlength">{{'ASSET_STATUS' | translate}} Maximum Length is 100 </div>
                  <div *ngIf="assetStatusForm.controls.assetStatusName.errors.notUnique">{{ErrorMsg}}</div>
                </mat-error>
              </mat-form-field>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12 rightbutton">
            <button mat-raised-button class="space col-md-3" color="primary" (click)="submit()" [disabled]="assetStatusForm.invalid || !assetStatusForm.dirty || uploadFlagAssetStatus" >
            <span *ngIf="!uploadFlagAssetStatus">{{displayButton}}</span> 
            <span *ngIf="uploadFlagAssetStatus">{{'COMMON_LOADING' | translate}} </span>
        </button> 
        </div>
      </div>
  </form>
