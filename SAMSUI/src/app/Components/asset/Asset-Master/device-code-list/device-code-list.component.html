<div div fxLayout="column" fxFlexFill>

  <div fxLayout="row" fxFlex="100" fxFlexFill>
    <div fxFlex="35" fxLayoutAlign="start center">
      <mat-form-field class="example-full-width" [floatLabel]="'always'">
        <mat-label class="input-label">Search {{'DEVICE_CODE'| translate}}</mat-label>
        <input matInput type="search" #searchSet name="search" id="search" class="form-control"
          (input)="onSearchChange($event.target.value)">
      </mat-form-field>
    </div>

    <div fxFlex="65" fxLayoutAlign="end center"></div>
  </div>

  <mat-toolbar>
    <span>{{'DEVICE_CODE'| translate}} List</span>
    <span class="example-spacer"></span>
    <mat-paginator class="asset-list-paginator" #paginatorUsers [pageSizeOptions]="[5, 10, 25, 50, 100]"
      [length]="length" [pageIndex]="pageIndex" [pageSize]="pageSize" (page)="getServerData($event)"></mat-paginator>
    <span class="example-spacer"></span>

    <button mat-raised-button class="space sqr-btn" color="primary" matTooltip="{{ 'COMMON_CREATE' | translate }}"
      [matTooltipPosition]="'below'" *ngIf="modelAccessModule.createFlagDisplay"
      (click)="openToCreateDeviceCode(0,'Create')"><mat-icon>add</mat-icon>
    </button>
    <button [disabled]="selectedItem == 0" color="primary" mat-raised-button class="space sqr-btn"
      *ngIf="modelAccessModule.updateFlagDisplay" matTooltip="{{ 'COMMON_EDIT' | translate }}"
      (click)="openToCreateDeviceCode(selectedItem, 'edit')">
      <mat-icon>edit</mat-icon>
    </button>
    <button [disabled]="selectedItem == 0" color="primary" mat-raised-button class="space sqr-btn"
      *ngIf="modelAccessModule.readFlagDisplay" matTooltip="{{ 'COMMON_VIEW' | translate }}"
      (click)="openToCreateDeviceCode(selectedItem, 'view')">
      <mat-icon>visibility</mat-icon>
    </button>
  </mat-toolbar>

  <div>
    <div fxLayout="column" fxFlexFill class="category-container-table">
      <table mat-table [dataSource]="listOfDeviceCode" matSort (matSortChange)="customSort($event)" matSortActive="name"
        matSortDirection="asc" matSortDisableClear>
        <ng-container matColumnDef="sno">
          <th mat-header-cell *matHeaderCellDef style="width: 5%;"> Select </th>
          <td mat-cell *matCellDef="let element; let i=index;" style="width: 5%;">
            <mat-checkbox color="primary" class="example-margin" (change)="selectDeviceCode(element)"
              [checked]="selectedItem.deviceCodeId == element?.deviceCodeId"></mat-checkbox>
          </td>
        </ng-container>
        <ng-container matColumnDef="deviceCode">
          <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 8%;"> {{ 'DEVICE_CODE' | translate }}
          </th>
          <td mat-cell *matCellDef="let element" (click)="selectDeviceCode(element)" style="width: 8%;">
            {{element.deviceCode}} </td>
        </ng-container>
        <ng-container matColumnDef="deviceConcept">
          <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 50%;"> {{ 'DEVICE_CONCEPT' | translate }}
          </th>
          <td mat-cell *matCellDef="let element" (click)="selectDeviceCode(element)"
            style="text-align: justify; width: 50%;"> {{element.deviceConcept}}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
        <tr mat-row *matRowDef="let element; columns: displayedColumns;">
        </tr>
      </table>
      <mat-card class="no_records_found" *ngIf="length=='0' && !subLoaderAssetType">{{'COMMON_NO_RECORDS_FOUND' |
        translate}}</mat-card>
      <mat-card class="no_records_found" *ngIf="subLoaderAssetType" fxLayoutAlign="center center">
        <mat-spinner [diameter]="40"></mat-spinner>
      </mat-card>
    </div>
  </div>
</div>
