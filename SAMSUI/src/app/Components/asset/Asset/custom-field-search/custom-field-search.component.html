<div fxLayout="column" fxFlexFill>
  <div fxLayout="row">
    <div fxFlex="50" >
      <h6 class="dialogue-box-header">{{ 'CUSTOM_FIELD_SEARCH' | translate}}</h6>
    </div>
    <div fxFlex="40" fxLayoutAlign="end start">
      <button mat-raised-button class="space" color="primary" (click)="onAdd()" [disabled]="disableAddBtn">
        {{'COMMON_ADD' | translate}}</button>
        
        <button id="submit" mat-raised-button class="space" color="primary" (click)="save(true)" [disabled]="disableSubmit">
          {{'COMMON_SUBMIT' | translate}}</button>
    </div>
    <div fxFlex="10" fxLayoutAlign="end start">
      <mat-icon class="close-icon-large close-icon" (click)="save(false)" >highlight_off</mat-icon>
    </div>
  </div>

  <div fxLayout="row" class="header-panel">
        <h4 class="dialogue-box-header"> Sub Category : {{subCategoryName}} </h4>
  </div>

  <div fxLayout="row" class="header-panel">
   <div class="note-message"[innerHTML]="noteMsg"></div>
  </div>  

  <div class="form-panel">

  <div id="submit" >
    <div >
      <table #matAssignee class="custom-field-table" mat-table [dataSource]="result">
        <ng-container matColumnDef="searchField">
          <th mat-header-cell *matHeaderCellDef class="text-center" >
            {{ 'SELECT_SEARCH_FIELD' | translate }}</th>
          <td mat-cell *matCellDef="let element; let i = index;">
            <ng-select (search)="getList($event)" (click)="getList($event)" [items]="cusFieldHdrList" bindLabel="labelName"         
                bindValue="labelName" [(ngModel)]="element.labelName" [ngModelOptions]="{standalone: true}" (change)="selectedAttributeData($event,i)"
                class="input-field">
            </ng-select>
          </td>
        </ng-container>

        <ng-container matColumnDef="fieldValue">
          <th mat-header-cell *matHeaderCellDef  class="text-center">
            {{'CUSTOM_FIELD_VALUE' | translate}}</th>
          <td mat-cell *matCellDef="let element; let i = index;">
            <div fxLayout="column" fxFlex="100">
            <div  fxLayout="row" fxFlex="100" *ngFor="let res of element.comboValues; let j = index; trackBy:trackByFn"> 
              <div fxLayout="row" fxFlex="90">
                <div class="style-margin" *ngIf="element.customHdrId == 0"></div>
                <div fxFlex="90" >
                  <mat-form-field fxFlex="100" class="example-full-width" [floatLabel]="'always'" *ngIf="element.inputType == 'TEXT'">
                    <input matInput [(ngModel)]="element.comboValues[j]" [ngModelOptions]="{standalone: true}" class="input-field"/>
                  </mat-form-field>
    
                  <mat-form-field fxFlex="100" class="example-full-width" [floatLabel]="'always'" *ngIf="element.inputType == 'NUMBER'">
                    <input type="number" matInput [(ngModel)]="element.comboValues[j]" [ngModelOptions]="{standalone: true}" class="input-field" />
                  </mat-form-field>
    
                  <ng-select *ngIf="element.inputType == 'CHECKBOX'" [(ngModel)]="element.comboValues[j]" [ngModelOptions]="{standalone: true}"  class="input-field input-field-1" (change)="custCheckboxValue($event,i,j)" >
                  <ng-option value="TRUE">YES</ng-option>
                  <ng-option value="FALSE">NO</ng-option>
                  </ng-select>
    
                  <mat-form-field fxFlex="100" *ngIf="element.inputType == 'DATE'" class="example-full-width">
                    <input matInput (click)="custFieldDt.open()" [matDatepicker]="custFieldDt"
                    [(ngModel)]="element.comboValues[j]" [ngModelOptions]="{standalone: true}"
                      (dateChange)="custFieldDtValidation($event,i,j)" class="input-field">
                    <mat-datepicker-toggle matSuffix [for]="custFieldDt"></mat-datepicker-toggle>
                    <mat-datepicker #custFieldDt></mat-datepicker>
                  </mat-form-field>
    
                  <ng-select *ngIf="element.inputType =='DROP DOWN(TEXT LIST)'" [items]="customFieldComboData[i]" bindLabel="customValues" bindValue="customValues" [(ngModel)]="element.comboValues[j]" [ngModelOptions]="{standalone: true}" class="input-field input-field-1" (clear)="custDropdownValue('clear',i,customFieldComboData[i])" 
                  (change)="selectedCustDropdownValue($event,i,j)">
                  </ng-select>
                </div>
                <div fxFlex="10" *ngIf="(element.inputType == 'DROP DOWN(TEXT LIST)' || element.inputType == 'TEXT' || element.inputType == 'NUMBER' || element.inputType == 'CHECKBOX' || element.inputType == 'DATE') && (element.comboValues.length > 1)">
                  <button mat-icon-button  class="space" color="primary" (click)="removevalue(i,j,element)" >
                    <mat-icon>remove_circle</mat-icon>
                  </button>
                </div>
              </div>
              
              <div fxLayout="row" fxFlex="10">
                <div fxLayoutAlign="end start" *ngIf="((element.inputType == 'DROP DOWN(TEXT LIST)' || element.inputType == 'TEXT' || element.inputType == 'NUMBER' || element.inputType == 'DATE') 
                && (element.comboValues.length-1 == j))  
                || ((element.inputType == 'CHECKBOX' && count < 1) && (element.comboValues.length-1 == j))">
                  <button mat-icon-button  class="space" color="primary" (click)="addValue(i,element)">
                    <!-- <mat-icon>add_circle</mat-icon> -->
                    <div class="plus-icon add-circle-icon"></div>
                  </button>
                </div>
              </div>
            </div>   
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef  class="text-center" >
            {{'COMMON_DELETE' | translate}}</th>
          <td mat-cell *matCellDef="let element; let i = index;"  class="text-center"> 
            <button color="primary" mat-raised-button class="space sqr-btn" 
                  matTooltip="{{ 'COMMON_DELETE' | translate }}" (click)="removeUnit(i,element)">
                  <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>

        <tr mat-row *matRowDef="let element; columns: displayedColumns;"></tr>

      </table>
      </div>
    </div>
  </div>
</div>
