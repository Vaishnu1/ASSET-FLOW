<div fxLayout="column" fxFlexFill>
  <div class="content_section_background">
    <div fxLayout="column">
      <hr />
      <mat-toolbar>
        <span>Reject Reason</span>
        <span class="example-spacer"></span>
        <button mat-raised-button class="space col-md-5" color="primary" (click)="closeModal()">
          Close
        </button>
      </mat-toolbar>
    </div>
  </div>

  <div class="row" style="padding: 1rem;">
    <textarea
      matInput
      class="mat-elevation-z2"
      rows="5"
      style="width: 100%; resize: none;padding: 5px;"
      [value]="rejectReason"
      readonly>
    </textarea>
  </div>
</div>
