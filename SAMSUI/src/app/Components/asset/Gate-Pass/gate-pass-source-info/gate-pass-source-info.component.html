<div fxLayout="column" fxFlexFill>
    <div class="content_section_background">
        <div fxLayout="column">
            <hr />
            <mat-toolbar>
                <span>{{title}}</span>
                <span class="example-spacer"></span>
                <span class="example-spacer"></span>
                <button mat-raised-button class="space col-md-5" color="primary" (click)="closeModal()">
                    Close
                </button>
            </mat-toolbar>
        </div>
    </div>
    <div class="row">
        <form [formGroup]="gatePassMainInfoForm" fxFlex="100" class="modalForm">

            <div class="form-group">
                <div class="example-full-width">
                    <mat-form-field [floatLabel]="'always'" class="example-full-width">
                        <mat-label class="example-label">{{'GATE_PASS_SOURCE' | translate }}</mat-label>
                        <input matInput class="input-field" formControlName="gatePassSource">
                    </mat-form-field>
                </div>
            </div>

            <div class="form-group">
                <div class="example-full-width">
                    <mat-form-field [floatLabel]="'always'" class="example-full-width">
                        <mat-label class="example-label">{{'GATE_PASS_SOURCE_NO' | translate}}</mat-label>
                        <input matInput class="input-field" formControlName="gatePassSourceNo">
                    </mat-form-field>
                </div>
            </div>
            <!-- supplier invoice hdr start here -->
        </form>
    </div>                        
</div>
