<div fxLayout="column">
  <div fxFlex="100"> 
    <div fxLayout="row"> 
      <div fxFlex="95">
        <h4 class="section_title">{{headingDisplay}} {{ 'MENU_WORKFLOW_HIERARCHY' | translate }}</h4>
      </div>
      
      <div fxFlex="5" class="first-title"> 
        <mat-icon class="close-icon-large close-icon" (click)="closeModal()">highlight_off</mat-icon>
      </div>
    </div>
 
    <div fxLayout="row"> 
      <form class="modalform" fxFlex="100" [formGroup]="workflowHierarchyHdrForm">  
          <div class="form-group"> 
            <span class="input-label">{{'LOCATION_NAME' | translate}}<span
              class="mandatory-style">*</span></span>
            <ng-select class=" input-field" required formControlName="locationName"
              (search)="listOfLocationName($event)" (click)="listOfLocationName({})"
              (change)="setLocationNameComboValue($event)" [items]="locationCombo" [virtualScroll]="true"
              (scrollToEnd)="listOfLocationName({})" (keyup.backspace)="listOfLocationName($event.target.value ? $event : 'back')" (clear)="listOfLocationName('clear')" [loading]="scrollLocationNameSync" bindLabel="locDisplayField"
              bindValue="locDisplayField">
            </ng-select>
            <mat-error
              *ngIf="workflowHierarchyHdrForm.controls.locationName.invalid && workflowHierarchyHdrForm.controls.locationName.touched">
              <div class="err-field" *ngIf="workflowHierarchyHdrForm.controls.locationName.errors.required">
              {{'LOCATION_NAME' | translate}} is Required </div>
            </mat-error> 
          </div>
  
            <div class="form-group">
              <span class="input-label"> {{ 'MENU_EMPLOYEE' | translate }} <span class="mandatory-style">*</span> </span>
              <ng-select  formControlName="employeeName" class="emp-drpdown"
                (click)="listOfEmployeeName({})" [virtualScroll]="true"
                (search)="listOfEmployeeName($event)" (scrollToEnd)="listOfEmployeeName({})" (keyup.backspace)="listOfEmployeeName($event.target.value ? $event : 'back')" (clear)="listOfEmployeeName('clear')"
                (change)="setEmployeeNameCombo($event)" [items]="employeeCombo" bindLabel="employeeFirstName"
                bindValue="employeeFirstName" [loading]="scrollSyncEmployeeCombo" loadingText="Loading..." required>
              </ng-select>
              <mat-error *ngIf="workflowHierarchyHdrForm.controls.employeeName.invalid && workflowHierarchyHdrForm.controls.employeeName.touched">
                <div class="err-field" *ngIf="workflowHierarchyHdrForm.controls.employeeName.errors.required">
                  {{'MENU_EMPLOYEE' | translate}} is Required </div>
              </mat-error>
            </div>
            
            <div fxLayout="row" class="description-create-form">
              <button mat-raised-button class="space" color="primary" (click)="submit()"
              [disabled]="workflowHierarchyHdrForm.invalid || !workflowHierarchyHdrForm.dirty || uploadFlagWorkflowDescription">
              <span *ngIf="!uploadFlagWorkflowDescription">{{displayButton}}</span>
              <span *ngIf="uploadFlagWorkflowDescription">{{'COMMON_LOADING' | translate}} </span>
            </button>
            </div>
 
      </form>
    </div>
  </div>
</div>
