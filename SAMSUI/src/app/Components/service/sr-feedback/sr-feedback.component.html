<div fxLayout="column">
    <div fxLayout="row">
      <div fxFlex="95">
        <h4 class="dialogue-box-header">{{'SR_FEEDBACK' | translate}}</h4>
      </div>
      <div fxFlex="5" fxLayoutAlign="end start">
        <mat-icon class="close-icon" color="primary" (click)="closeModal('close')">highlight_off</mat-icon>
      </div>
    </div>
  
    <div>
      <hr>
    </div>
  
    <div class="form-group">
      <div fxLayout="column" fxFlex="100" fxLayoutAlign="start">
        <div class="element-style">
          <mat-radio-button (change)="changeAllowEditItem('GOOD')">
            {{'FEEDBACK_GOOD' | translate}}
          </mat-radio-button>
        </div>
        <div class="element-style">
          <mat-radio-button  (change)="changeAllowEditItem('SATISFACTORY')">
            {{'FEEDBACK_SATISFACTORY' | translate}}
          </mat-radio-button>
        </div>
        <div class="element-style">
          <mat-radio-button  (change)="changeAllowEditItem('UNSATISFACTORY')">
            {{'FEEDBACK_UNSATISFACTORY' | translate}}
          </mat-radio-button>
        </div>
  
        <!-- Add the textarea for remarks -->
        <div class="element-style">
          <mat-form-field appearance="fill" class="full-width">
            <mat-label>{{ 'REMARKS' | translate }}</mat-label>
            <textarea matInput [(ngModel)]="remarks" placeholder="Enter your remarks"></textarea>
          </mat-form-field>
        </div>
  
        <div fxFlex="20" class="mt-30 ml-30px" class="btn">
            <button mat-raised-button class="space " color="primary" (click)="clear()">{{'COMMON_CLEAR' | translate}}</button> 
            <button mat-raised-button color="primary" class="space" [disabled]="!feedback" (click)="closeModal('submit')">
            {{ 'COMMON_SUBMIT' | translate }}
            </button>
        </div>
      </div>
    </div>
  </div>
